specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: Booztory
    network: base-sepolia
    source:
      address: "0xb73E5f05222f829397202bb2d9C2C15eE4a24132"
      abi: Booztory
      startBlock: 39558013
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Wallet
        - Slot
        - SlotMintEvent
        - GMClaimEvent
        - PointsEarnedEvent
        - DonationEvent
        - TicketsConvertedEvent
      abis:
        - name: Booztory
          file: Booztory\Booztory.json
      eventHandlers:
        - event: SlotMinted(indexed uint256,indexed address,uint256,uint256)
          handler: handleSlotMinted
        - event: FreeSlotMinted(indexed uint256,indexed address,uint256)
          handler: handleFreeSlotMinted
        - event: DiscountSlotMinted(indexed uint256,indexed address,uint256,uint256)
          handler: handleDiscountSlotMinted
        - event: GMClaimed(indexed address,uint16,uint256)
          handler: handleGMClaimed
        - event: PointsEarned(indexed address,uint256,string)
          handler: handlePointsEarned
        - event: DonationReceived(indexed uint256,indexed address,uint256,uint256)
          handler: handleDonationReceived
        - event: TicketsConverted(indexed address,uint256,uint256)
          handler: handleTicketsConverted
      file: Booztory\Booztory.wasm
  - kind: ethereum
    name: BooztoryRaffle
    network: base-sepolia
    source:
      address: "0xE018C70AB3eC93848Fad52dbC66A433DBCC1d9Af"
      abi: BooztoryRaffle
      startBlock: 39558014
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Wallet
        - WinEvent
        - RaffleEnteredEvent
        - DrawnRaffle
      abis:
        - name: BooztoryRaffle
          file: BooztoryRaffle\BooztoryRaffle.json
      eventHandlers:
        - event: DrawCompleted(indexed uint256,address[])
          handler: handleDrawCompleted
        - event: RaffleEntered(indexed uint256,indexed address,uint256,uint256)
          handler: handleRaffleEntered
      file: BooztoryRaffle\BooztoryRaffle.wasm
