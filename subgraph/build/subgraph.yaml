specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: Booztory
    network: base
    source:
      address: "0x59d764E631C3382cd89B104BF1e4846053Be5c35"
      abi: Booztory
      startBlock: 44138035
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Wallet
        - Slot
        - SlotMintEvent
        - GMClaimEvent
        - PointsEarnedEvent
        - DonationEvent
        - TicketsConvertedEvent
      abis:
        - name: Booztory
          file: Booztory\Booztory.json
      eventHandlers:
        - event: SlotMinted(indexed uint256,indexed address,uint256,uint256)
          handler: handleSlotMinted
        - event: FreeSlotMinted(indexed uint256,indexed address,uint256)
          handler: handleFreeSlotMinted
        - event: DiscountSlotMinted(indexed uint256,indexed address,uint256,uint256)
          handler: handleDiscountSlotMinted
        - event: NFTDiscountSlotMinted(indexed uint256,indexed address,indexed address,uint256)
          handler: handleNFTDiscountSlotMinted
        - event: NFTFreeSlotMinted(indexed uint256,indexed address,indexed address,uint256)
          handler: handleNFTFreeSlotMinted
        - event: GMClaimed(indexed address,uint16,uint256)
          handler: handleGMClaimed
        - event: GMMilestoneReached(indexed address,uint16,uint256)
          handler: handleGMMilestoneReached
        - event: PointsEarned(indexed address,uint256,string)
          handler: handlePointsEarned
        - event: DonationReceived(indexed uint256,indexed address,uint256,uint256)
          handler: handleDonationReceived
        - event: TicketsConverted(indexed address,uint256,uint256)
          handler: handleTicketsConverted
      file: Booztory\Booztory.wasm
  - kind: ethereum
    name: BooztoryRaffle
    network: base
    source:
      address: "0x8AD73ba2C5a0BEa7E22B78081441ABA6c80A602a"
      abi: BooztoryRaffle
      startBlock: 44680022
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Wallet
        - WinEvent
        - RaffleEnteredEvent
        - DrawnRaffle
        - CancelledRaffle
      abis:
        - name: BooztoryRaffle
          file: BooztoryRaffle\BooztoryRaffle.json
      eventHandlers:
        - event: DrawCompleted(indexed uint256,address[])
          handler: handleDrawCompleted
        - event: RaffleCancelled(indexed uint256)
          handler: handleRaffleCancelled
        - event: RaffleEntered(indexed uint256,indexed address,uint256,uint256)
          handler: handleRaffleEntered
      file: BooztoryRaffle\BooztoryRaffle.wasm
