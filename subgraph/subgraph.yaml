specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Booztory
    # Change to "base" at mainnet deployment
    network: base-sepolia
    source:
      address: "0xf8d6064a173A4a3EA83a07309067939AD45E87cC"
      abi: Booztory
      # Set to the block your contract was deployed — check Basescan
      startBlock: 39430960
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Wallet
        - Slot
        - SlotMintEvent
        - GMClaimEvent
        - PointsEarnedEvent
        - DonationEvent
        - TicketsConvertedEvent
      abis:
        - name: Booztory
          file: ./abis/Booztory.json
      eventHandlers:
        - event: SlotMinted(indexed uint256,indexed address,uint256,uint256)
          handler: handleSlotMinted
        - event: FreeSlotMinted(indexed uint256,indexed address,uint256)
          handler: handleFreeSlotMinted
        - event: DiscountSlotMinted(indexed uint256,indexed address,uint256,uint256)
          handler: handleDiscountSlotMinted
        - event: GMClaimed(indexed address,uint16,uint256)
          handler: handleGMClaimed
        - event: PointsEarned(indexed address,uint256,string)
          handler: handlePointsEarned
        - event: DonationReceived(indexed uint256,indexed address,uint256,uint256)
          handler: handleDonationReceived
        - event: TicketsConverted(indexed address,uint256,uint256)
          handler: handleTicketsConverted
      file: ./src/booztory.ts
  - kind: ethereum
    name: BooztoryRaffle
    network: base-sepolia
    source:
      address: "0x34F8292aa73cb8eb87DBF43Ae7F0E04f91A778d2"
      abi: BooztoryRaffle
      startBlock: 39429911
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Wallet
        - WinEvent
        - RaffleEnteredEvent
        - DrawnRaffle
      abis:
        - name: BooztoryRaffle
          file: ./abis/BooztoryRaffle.json
      eventHandlers:
        - event: DrawCompleted(indexed uint256,address[])
          handler: handleDrawCompleted
        - event: RaffleEntered(indexed uint256,indexed address,uint256,uint256)
          handler: handleRaffleEntered
      file: ./src/raffle.ts
